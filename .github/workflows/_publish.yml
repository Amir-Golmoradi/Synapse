name: Build & Publish Image

on:
  workflow_call:
    inputs:
      image:
        description: Full image name, for example ghcr.io/owner/synapse
        required: true
        type: string

    outputs:
      image-tag:
        description: Immutable short-SHA image tag consumed by deployment
        value: ${{ jobs.publish.outputs.image-tag }}

jobs:
  publish:
    name: Build & Publish Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Authenticate to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.image }}
          tags: |
            type=sha,format=short,priority=300
            type=raw,value=latest,enable={{is_default_branch}},priority=200

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max