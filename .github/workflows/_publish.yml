name: Build & Publish Image

on:
  workflow_call:
    inputs:
      image:
        description: Full image name — e.g. ghcr.io/owner/synapse-backend
        required: true
        type: string
    outputs:
      image-tag:
        description: Short SHA tag produced by this workflow — consumed by the deploy job
        value: ${{ jobs.run.outputs.image-tag }}

jobs:
  run:
    name: Build & Publish Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to GHCR
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      # Required by build-push-action — enables GHA layer cache and multi-platform
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Produces: sha-<7chars> and latest
      # sha-<7chars> is exported as the job output → passed to the deploy job
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and push multi-stage image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max