name: Synapse CI

on:
  pull_request:
    branches:
      - develop
      - staging
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  workflow_dispatch:

concurrency:
  group: synapse-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read

    env:
      ACTIONLINT_VERSION: 1.7.12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install actionlint
        run: |
          set -euo pipefail

          base_url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}"
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"

          curl -fsSLO "${base_url}/${archive}"
          curl -fsSLO "${base_url}/actionlint_${ACTIONLINT_VERSION}_checksums.txt"
          grep " ${archive}$" "actionlint_${ACTIONLINT_VERSION}_checksums.txt" | sha256sum -c -
          tar -xzf "${archive}" actionlint
          sudo install -m 0755 actionlint /usr/local/bin/actionlint

      - name: Validate GitHub Actions workflows
        run: actionlint .github/workflows/*.yml

  quality:
    name: Maven Verify
    uses: ./.github/workflows/_quality.yml
    permissions:
      contents: read

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          pull: true
          tags: synapse:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compose-config:
    name: Compose Config
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate Docker Compose configuration
        run: docker compose --env-file .env.example config --quiet
