name: Quality Gates

on:
  workflow_call:

jobs:
  run:
    name: Quality Gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Fail fast — formatting is the cheapest check
      - name: Formatting check (Spotless)
        run: ./mvnw spotless:check --no-transfer-progress

      # Unit tests, Testcontainers, Spring Modulith,
      # Checkstyle, PMD, SpotBugs — all in one lifecycle
      - name: Full verification
        run: ./mvnw clean verify --no-transfer-progress