name: Synapse Release

on:
  push:
    branches: [ main ]

jobs:
  quality:
    permissions:
      contents: read
    uses: ./.github/workflows/_quality.yml

  publish:
    needs: quality
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_publish.yml
    secrets: inherit
    with:
      image: ghcr.io/${{ github.repository_owner }}/Synapse

  deploy:
    needs: publish
    permissions:
      contents: write
    uses: ./.github/workflows/_deploy.yml
    secrets: inherit
    with:
      image-tag: ${{ needs.publish.outputs.image-tag }}
      gitops-repo: ${{ github.repository_owner }}/synapse-gitops
