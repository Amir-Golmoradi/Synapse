name: Update GitOps Manifest

on:
  workflow_call:
    inputs:
      image-tag:
        description: Short SHA tag to write into charts/synapse/values.yaml
        required: true
        type: string
      gitops-repo:
        description: owner/repo of the GitOps repository ArgoCD watches
        required: true
        type: string
    secrets:
      GITOPS_TOKEN:
        description: PAT with write access to the GitOps repository
        required: true

jobs:
  run:
    name: Update GitOps Manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read    # read-only on this repo — writes go to gitops repo via PAT
    steps:
      # Clones synapse-gitops, NOT the application repo
      - name: Checkout synapse-gitops
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.gitops-repo }}
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Patch image tag in Helm values
        run: |
          sed -i "s|tag:.*|tag: \"${{ inputs.image-tag }}\"|g" charts/synapse/values.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/synapse/values.yaml
          git commit -m "chore(deploy): bump synapse-backend to ${{ inputs.image-tag }}"
          git push